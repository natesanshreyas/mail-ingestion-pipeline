name: Deploy to AKS

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    branches: [main]
    types: [completed]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Apply manifests
        run: |
          for f in k8s/reconciler/cronjob.yaml k8s/ingestion-worker/deployment.yaml; do
            sed -e "s|\${ACR_LOGIN_SERVER}|$ACR_LOGIN_SERVER|g" \
                -e "s|\${IMAGE_TAG}|$IMAGE_TAG|g" \
                "$f" | kubectl apply -f -
          done

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/ingestion-worker/service.yaml
          kubectl apply -f k8s/ingestion-worker/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ingestion-worker -n mail-ingestion --timeout=120s
