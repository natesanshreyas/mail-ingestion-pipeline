# DO NOT apply this file directly — reference template only.
# deploy.sh creates the secret imperatively so real values never touch source control.
#
# To create manually:
#   kubectl create secret generic mail-ingestion-secrets \
#     --namespace mail-ingestion \
#     --from-literal=GRAPH_TENANT_ID="..." \
#     --from-literal=GRAPH_CLIENT_ID="..." \
#     --from-literal=GRAPH_CLIENT_SECRET="..." \
#     --from-literal=GRAPH_CLIENT_STATE="..." \
#     --from-literal=OPENAI_API_KEY="..." \
#     --from-literal=ASB_CONNECTION_STRING="<asb-listen-connection-string>" \
#     --from-literal=ASB_SEND_CONNECTION_STRING="<asb-send-connection-string>" \
#     --from-literal=ASB_QUEUE_NAME="mail-notifications" \
#     --from-literal=EVENTHUB_CONNECTION_STRING="<eventhub-send-connection-string>" \
#     --from-literal=STORAGE_CONNECTION_STRING="..." \
#     --from-literal=COSMOS_ENDPOINT="..." \
#     --from-literal=COSMOS_KEY="..."
apiVersion: v1
kind: Secret
metadata:
  name: mail-ingestion-secrets
  namespace: mail-ingestion
type: Opaque
stringData:
  GRAPH_TENANT_ID:           "<azure-tenant-id>"
  GRAPH_CLIENT_ID:           "<app-registration-client-id>"
  GRAPH_CLIENT_SECRET:       "<app-registration-client-secret>"
  GRAPH_CLIENT_STATE:        "<random-secret-string>"
  OPENAI_API_KEY:            "<openai-api-key>"
  ASB_CONNECTION_STRING:     "<terraform-output: asb_listen_connection_string>"
  ASB_SEND_CONNECTION_STRING: "<terraform-output: asb_send_connection_string>"
  ASB_QUEUE_NAME:            "mail-notifications"
  EVENTHUB_CONNECTION_STRING: "<terraform-output: eventhub_send_connection_string>"
  STORAGE_CONNECTION_STRING: "<terraform-output: storage_connection_string>"
  COSMOS_ENDPOINT:           "<terraform-output: cosmos_endpoint>"
  COSMOS_KEY:                "<terraform-output: cosmos_primary_key>"
